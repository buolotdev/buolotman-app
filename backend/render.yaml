build:
  command: |
    pip install --upgrade pip
    pip install -r requirements/base.txt
    python manage.py collectstatic --no-input
    python manage.py migrate --no-input

start:
  command: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120

envVars:
  - key: DJANGO_SETTINGS_MODULE
    value: config.settings.prod
  - key: PYTHONUNBUFFERED
    value: "1"
  - key: PYTHONDONTWRITEBYTECODE
    value: "1"
  - key: SECRET_KEY
    generateValue: true
  - key: ALLOWED_HOSTS
    value: ".onrender.com"
  - key: CORS_ALLOWED_ORIGINS
    sync: false
  - key: DATABASE_URL
    sync: false
  - key: REDIS_URL
    sync: false
  - key: SUPABASE_URL
    value: "https://sxmjwjuwfsvjjqcldziw.supabase.co"
  - key: SUPABASE_SERVICE_KEY
    sync: false
  - key: SUPABASE_STORAGE_BUCKET
    value: "boulotman"
